{% extends "base.html" %}

{% block content %}

<h3>Поиск книг</h3>

<form method="get" class="mb-4">
    <input type="text" name="q" class="form-control" placeholder="Введите название книги">
</form>

<div class="row">
{% for book in books %}
    <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">

            <h5>{{ book.title }}</h5>
            <p class="text-muted">{{ book.author }}</p>

            <p>Доступно: {{ book.available }}/{{ book.copies }}</p>

            <a href="/book/{{ book.isbn }}/" class="btn btn-primary btn-sm">
                Подробнее
            </a>

        </div>
    </div>
{% endfor %}
</div>

{% endblock %}
